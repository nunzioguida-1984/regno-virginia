let audioCtx = null;
function getCtx() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function playTone(freq, start, dur, type = "sine", gainPeak = 0.18) {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(gainPeak, ctx.currentTime + start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + dur + 0.05);
  } catch (e) {}
}

};
function useSound(enabled) {

}

const STORAGE_KEY = "il-regno-di-virginia-progress";

const HEAVY_TYPES = new Set(["trace-answer", "story-mc", "draw-instructions", "fill-blank"]);
function buildAlternatingPath(exercises) {
  const light = exercises.filter((e) => !HEAVY_TYPES.has(e.type));
  const heavy = exercises.filter((e) => HEAVY_TYPES.has(e.type));
  const result = [];
  let li = 0, hi = 0;
  while (li < light.length || hi < heavy.length) {
    for (let k = 0; k < 3 && li < light.length; k++) result.push(light[li++]);
    if (hi < heavy.length) result.push(heavy[hi++]);
  }
  return result;
}
const ORDERED_EXERCISES = buildAlternatingPath(EXERCISES);

function IlRegnoDiVirginia() {
  const [currentIndex, setCurrentIndex] = useState(0);
  const [completed, setCompleted] = useState({});
  const [stars, setStars] = useState(0);
  const [loaded, setLoaded] = useState(false);
  const [showCelebration, setShowCelebration] = useState(null);
  const [soundOn, setSoundOn] = useState(true);
  const playSound = useSound(soundOn);

  useEffect(() => {
    (async () => {
      try {
        const res = await storage.get(STORAGE_KEY);
        if (res?.value) {
          const data = JSON.parse(res.value);
          setCompleted(data.completed || {});
          setStars(data.stars || 0);
          setCurrentIndex(data.currentIndex || 0);
        }
      } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  const saveProgress = useCallback(async (newCompleted, newStars, newIndex) => {
    try { await storage.set(STORAGE_KEY, JSON.stringify({ completed: newCompleted, stars: newStars, currentIndex: newIndex })); }
    catch (e) { console.error("Errore salvataggio:", e); }
  }, []);

  const currentExercise = ORDERED_EXERCISES[currentIndex];
  const totalDone = Object.keys(completed).length;

  const handleExerciseComplete = (earnedStar) => {
    const exId = currentExercise.id;
    const newCompleted = { ...completed, [exId]: true };
    const newStars = earnedStar ? stars + 1 : stars;
    const prevLevel = Math.min(7, 1 + Math.floor(stars / 6));
    const newLevel = Math.min(7, 1 + Math.floor(newStars / 6));
    setCompleted(newCompleted);
    setStars(newStars);
    if (newLevel > prevLevel) { playSound(Sound.levelUp); setShowCelebration("level"); }
    else { playSound(Sound.exerciseDone); setShowCelebration("exercise"); }
    setTimeout(() => {
      setShowCelebration(null);
      const nextIndex = Math.min(currentIndex + 1, ORDERED_EXERCISES.length - 1);
      setCurrentIndex(nextIndex);
      saveProgress(newCompleted, newStars, nextIndex);
    }, newLevel > prevLevel ? 2200 : 1400);
  };

  const goToIndex = (idx) => { setCurrentIndex(idx); saveProgress(completed, stars, idx); };
  const resetProgress = async () => { setCompleted({}); setStars(0); setCurrentIndex(0); await saveProgress({}, 0, 0); };

  const level = Math.min(7, 1 + Math.floor(stars / 6));
  const isLastExercise = currentIndex === ORDERED_EXERCISES.length - 1;
  const allDone = totalDone === ORDERED_EXERCISES.length;

  if (!loaded) {
    return (
      <div style={styles.loadingScreen}>
        <div style={styles.loadingSpinner}>🏰</div>
        <p style={{ fontFamily: "Quicksand, sans-serif", color: "#7C3AED", fontWeight: 700 }}>Apertura del regno...</p>
      </div>
    );
  }

  if (allDone) {
    return (
      <div style={styles.app}>
        <FinalScreen stars={stars} onReset={resetProgress} />
      </div>
    );
  }

  return (
    <div style={styles.app}>
      <p style={styles.appTitle}>🦄 Il Regno di Virginia 🦄</p>
      <TopBar stars={stars} level={level} totalDone={totalDone} totalExercises={ORDERED_EXERCISES.length} soundOn={soundOn} onToggleSound={() => setSoundOn((s) => !s)} />
      <PathStrip exercises={ORDERED_EXERCISES} completed={completed} currentIndex={currentIndex} onJump={goToIndex} />
      <ExerciseStage key={currentExercise.id} exercise={currentExercise} isDone={!!completed[currentExercise.id]} isLast={isLastExercise} onComplete={handleExerciseComplete} playSound={playSound} />
      {showCelebration === "exercise" && <BurstCelebration emoji="⭐" />}
      {showCelebration === "level" && <LevelUpCelebration level={level} />}
      <button onClick={resetProgress} style={styles.resetButton}>Ricomincia il regno</button>
    </div>
  );
}

function TopBar({ stars, level, totalDone, totalExercises, soundOn, onToggleSound }) {
  return (
    <div style={styles.topBar}>
      <div style={styles.topBarRow}>
        <div style={styles.avatarRow}>
          <div style={styles.avatarCircle}>🦄</div>
          <div>
            <p style={styles.greetName}>Virginia</p>
            <p style={styles.greetSub}>Livello {level} di 7</p>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <button onClick={onToggleSound} style={styles.soundButton}>{soundOn ? "🔊" : "🔇"}</button>
          <div style={styles.starsPill}><span style={{ fontSize: 16 }}>⭐</span><span style={styles.starsPillNum}>{stars}</span></div>
        </div>
      </div>
      <div style={styles.levelBarOuter}><div style={{ ...styles.levelBarInner, width: `${(totalDone / totalExercises) * 100}%` }} /></div>
      <p style={styles.levelBarLabel}>{totalDone} / {totalExercises} esercizi completati</p>
    </div>
  );
}

function PathStrip({ exercises, completed, currentIndex, onJump }) {
  const scrollRef = useRef(null);
  useEffect(() => {
    if (scrollRef.current) {
      const activeEl = scrollRef.current.querySelector(`[data-idx="${currentIndex}"]`);
      if (activeEl) activeEl.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
    }
  }, [currentIndex]);
  return (
    <div style={styles.pathStripOuter} ref={scrollRef}>
      <div style={styles.pathStripInner}>
        {exercises.map((ex, idx) => {
          const cat = CATEGORIES.find((c) => c.id === ex.cat);
          const isDone = completed[ex.id];
          const isCurrent = idx === currentIndex;
          const isLocked = idx > currentIndex && !isDone;
          return (
            <React.Fragment key={ex.id}>
              <button data-idx={idx} onClick={() => { if (!isLocked) onJump(idx); }} disabled={isLocked}
                style={{ ...styles.pathNode, background: isDone ? "#FBBF24" : isCurrent ? cat.color : "#E9E4F5", color: isDone || isCurrent ? "white" : "#B9AEDC", transform: isCurrent ? "scale(1.18)" : "scale(1)", cursor: isLocked ? "default" : "pointer", boxShadow: isCurrent ? `0 0 0 4px ${cat.glow}` : "none" }}>
                {isDone ? "✓" : isLocked ? "🔒" : cat.emoji}
              </button>

function OrderExercise({ exercise, onComplete, playSound, plain }) {
  const [pool, setPool] = useState(() => shuffle(exercise.words));
  const [chosen, setChosen] = useState([]);
  const [result, setResult] = useState(null);
  const pick = (word, idx) => {
    if (result === "correct") return;
    const newChosen = [...chosen, word];
    const newPool = pool.filter((_, i) => i !== idx);
    setChosen(newChosen);
    setPool(newPool);
    if (newPool.length === 0) {
      if (plain) { setResult("correct"); playSound(Sound.correct); onComplete(true); }
      else {
        const correct = JSON.stringify(newChosen) === JSON.stringify(exercise.answer);
        setResult(correct ? "correct" : "wrong");
        if (correct) { playSound(Sound.correct); onComplete(true); } else playSound(Sound.wrong);
      }
    }
  };
  const reset = () => { setPool(shuffle(exercise.words)); setChosen([]); setResult(null); };
  return (
    <>
      <p style={styles.eyebrow}>{plain ? "Ordena les paraules" : "Ordena las palabras y forma la frase"}</p>
      <div style={styles.sentenceLine}>
        {chosen.length === 0 && <span style={styles.sentencePlaceholder}>Toca le parole in ordine...</span>}
        {chosen.map((w, i) => <span key={i} style={styles.chosenWord}>{w}</span>)}
      </div>
      <div style={styles.wordPool}>
        {pool.map((w, idx) => <button key={idx} onClick={() => pick(w, idx)} style={styles.wordChip}>{w}</button>)}
      </div>
      {result === "wrong" && (<><button onClick={reset} style={styles.retryButton}>Riprova</button><p style={styles.hintLine}>Suggerimento: {exercise.answer.join(" ")}</p></>)}
      <FeedbackLine result={result} />
    </>
  );
}

function MatchPairsExercise({ exercise, onComplete, playSound }) {
  const [matched, setMatched] = useState({});

  const [shuffledEmojis] = useState(() => shuffle(exercise.pairs.map((p, i) => ({ emoji: p.emoji, origIdx: i }))));
  const allMatched = Object.keys(matched).length === exercise.pairs.length;
  useEffect(() => { if (allMatched) { playSound(Sound.correct); onComplete(true); } }, [allMatched]);
  const clickText = (idx) => { if (matched[idx] === undefined) { setSelectedText(idx); playSound(Sound.tap); } };
  const clickEmoji = (item) => {
    if (selectedText === null) return;
    if (item.origIdx === selectedText) { setMatched((m) => ({ ...m, [selectedText]: item.origIdx })); setSelectedText(null); }

  };
  return (
    <>

      <div style={styles.matchGrid}>

          ))}
        </div>

function DrawInstructionsExercise({ exercise, onComplete, isDone }) {
  const canvasRef = useRef(null);
  const isDrawing = useRef(false);
  const lastPos = useRef({ x: 0, y: 0 });
  const [color, setColor] = useState("#1E1B2E");
  const [hasDrawn, setHasDrawn] = useState(false);
  const [checkedSteps, setCheckedSteps] = useState({});
  const [done, setDone] = useState(isDone);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const ratio = window.devicePixelRatio || 1;
    canvas.width = canvas.clientWidth * ratio;
    canvas.height = canvas.clientHeight * ratio;
    ctx.scale(ratio, ratio);
  }, []);
  const getPos = (e) => { const canvas = canvasRef.current; const rect = canvas.getBoundingClientRect(); const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY; return { x: clientX - rect.left, y: clientY - rect.top }; };
  const startDraw = (e) => { isDrawing.current = true; lastPos.current = getPos(e); setHasDrawn(true); };
  const draw = (e) => {
    if (!isDrawing.current) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const pos = getPos(e);
    ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    lastPos.current = pos;
  };
  const stopDraw = () => { isDrawing.current = false; };
  const clearCanvas = () => { const canvas = canvasRef.current; canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height); setHasDrawn(false); };
  const toggleStep = (i) => setCheckedSteps((s) => ({ ...s, [i]: !s[i] }));
  const palette = ["#1E1B2E", "#DC2626", "#2563EB", "#16A34A", "#FBBF24", "#C2410C", "#7C3AED"];
  return (
    <>
      <p style={styles.eyebrow}>Llegeix i dibuixa el que s'indica — {exercise.title}</p>
      <div style={styles.stepsList}>
        {exercise.steps.map((step, i) => (
          <button key={i} onClick={() => toggleStep(i)} style={styles.stepItem}>
            <span style={{ ...styles.stepCheckbox, background: checkedSteps[i] ? "#16A34A" : "white" }}>{checkedSteps[i] ? "✓" : ""}</span>
            <span style={{ ...styles.stepText, textDecoration: checkedSteps[i] ? "line-through" : "none", opacity: checkedSteps[i] ? 0.55 : 1 }}>{step}</span>
          </button>
        ))}
      </div>
      <div style={styles.canvasWrapTall}>
        <canvas ref={canvasRef} style={styles.canvasTall} onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw} onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw} />
      </div>
      <div style={styles.paletteRow}>
        {palette.map((c) => (<button key={c} onClick={() => setColor(c)} style={{ ...styles.colorDot, background: c, outline: color === c ? "3px solid #FBBF24" : "none" }} />))}
        <button onClick={clearCanvas} style={styles.clearButton}>🧹 Pulisci</button>
      </div>
      <p style={styles.parentNote}>Questo esercizio lo rivede un adulto — quando hai finito tutti i passaggi, premi "Ho finito".</p>
      {!done ? (<button onClick={() => { setDone(true); onComplete(true); }} disabled={!hasDrawn} style={{ ...styles.finishButton, opacity: hasDrawn ? 1 : 0.5 }}>Ho finito ✓</button>) : (<p style={styles.doneLabel}>✓ Fatto! Bel lavoro.</p>)}
    </>
  );
}

function drawGuideLines(ctx, w, h) {
  ctx.save();
  ctx.strokeStyle = "#E9D5FF"; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
  const lineY = h * 0.4;
  ctx.beginPath(); ctx.moveTo(10, lineY); ctx.lineTo(w - 10, lineY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(10, lineY + 26); ctx.lineTo(w - 10, lineY + 26); ctx.stroke();
  ctx.restore();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function FeedbackLine({ result }) {
  if (!result) return null;
  return (<p style={result === "correct" ? styles.feedbackCorrect : styles.feedbackWrong}>{result === "correct" ? "🎉 Molto bene! Hai guadagnato una stella." : "Riprova 💪"}</p>);
}

function BurstCelebration({ emoji }) {
  const particles = Array.from({ length: 14 }, (_, i) => i);
  const burstEmojis = ["🦄", "🌈", "✨", "⭐"];
  return (
    <div style={styles.celebrationOverlay}>
      {particles.map((i) => {
        const angle = (i / particles.length) * 2 * Math.PI;
        const dist = 90 + Math.random() * 60;
        return (<span key={i} style={{ ...styles.particle, transform: `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px) rotate(${Math.random() * 360}deg)` }}>{burstEmojis[i % burstEmojis.length]}</span>);
      })}
      <span style={styles.celebrationCenter}>🦄</span>
    </div>
  );
}

function LevelUpCelebration({ level }) {
  const particles = Array.from({ length: 24 }, (_, i) => i);
  return (
    <div style={styles.celebrationOverlay}>
      {particles.map((i) => {
        const angle = (i / particles.length) * 2 * Math.PI;
        const dist = 130 + Math.random() * 90;
        const emoji = ["🦄", "🌈", "✨", "⭐"][i % 4];
        return (<span key={i} style={{ ...styles.particleBig, transform: `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px) rotate(${Math.random() * 360}deg)` }}>{emoji}</span>);
      })}
      <div style={styles.levelUpBanner}>
        <p style={styles.levelUpTitle}>LIVELLO {level}!</p>
        <p style={styles.levelUpSub}>Virginia sale di livello 🦄✨</p>
      </div>
    </div>
  );
}

function FinalScreen({ stars, onReset }) {
  return (
    <div style={styles.finalScreen}>
      <div style={styles.finalEmoji}>🦄✨🌈</div>
      <h1 style={styles.finalTitle}>Hai completato tutto il quaderno!</h1>
      <p style={styles.finalSub}>Tutti gli esercizi sono finiti — bravissima, Virginia!</p>
      <div style={styles.finalStarsPill}>
        <span style={{ fontSize: 28 }}>⭐</span>
        <span style={styles.finalStarsNum}>{stars}</span>
        <span style={styles.finalStarsLabel}>stelle raccolte</span>
      </div>
      <button onClick={onReset} style={styles.finalResetButton}>Ricomincia il regno da capo</button>
    </div>
  );
}
